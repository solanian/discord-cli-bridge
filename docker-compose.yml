services:
  claude-bot:
    build: .
    container_name: discord-claude-bot
    restart: unless-stopped
    environment:
      - DISCORD_BOT_TOKEN=${CLAUDE_BOT_TOKEN}
      - BOT_CLI_TYPE=claude
      - DATA_DIR=/data
      - TMUX_TMPDIR=/data/tmux
    volumes:
      - claude-data:/data
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - ${CLAUDE_CONFIG_DIR:-~/.claude}:/home/node/.claude
      - ${CLAUDE_JSON:-~/.claude.json}:/home/node/.claude.json

  codex-appserver:
    build:
      context: .
      dockerfile: Dockerfile.codex-appserver
    container_name: codex-appserver
    restart: unless-stopped
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - ${CODEX_CONFIG_DIR:-~/.codex}:/home/node/.codex
    expose:
      - "9876"

  codex-bot:
    build: .
    container_name: discord-codex-bot
    restart: unless-stopped
    depends_on:
      - codex-appserver
    environment:
      - DISCORD_BOT_TOKEN=${CODEX_BOT_TOKEN}
      - BOT_CLI_TYPE=codex
      - DATA_DIR=/data
      - CODEX_APPSERVER_URL=ws://codex-appserver:9876
    volumes:
      - codex-data:/data
      - ${WORKSPACE_DIR:-./workspace}:/workspace

volumes:
  claude-data:
  codex-data:
